<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Dev.log — Concept B: Bold Character</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0a0a0a;}
  body{font-family:'Space Grotesk','Pretendard',system-ui,sans-serif;}
  .stage{width:1440px;height:900px;margin:40px auto;position:relative;background:#1A3FD4;color:#fff;overflow:hidden;}
  .display{font-family:'Archivo Black',sans-serif;}
  .top-nav{position:absolute;top:32px;left:48px;right:48px;display:flex;justify-content:space-between;align-items:center;font-weight:500;font-size:14px;color:#fff;z-index:3;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand i{width:10px;height:10px;background:#fff;border-radius:50%;display:block;}
  .nav-links{display:flex;gap:32px;opacity:.85;}
  .top-headline{position:absolute;top:80px;left:-40px;right:-40px;display:flex;justify-content:space-between;align-items:flex-start;font-family:'Archivo Black',sans-serif;font-size:240px;line-height:200px;color:#fff;letter-spacing:-.05em;z-index:2;}
  .orbit{position:absolute;top:240px;left:50%;transform:translateX(-50%);width:560px;height:560px;border:2px dashed rgba(255,255,255,.18);border-radius:50%;z-index:0;}
  .silhouette{position:absolute;top:180px;left:50%;transform:translateX(-50%);width:340px;height:540px;z-index:1;}
  .sparkle{position:absolute;font-family:'Archivo Black',sans-serif;color:#FFE74C;z-index:4;}
  .sparkle.s1{top:200px;left:340px;font-size:32px;}
  .sparkle.s2{top:520px;right:300px;font-size:24px;}
  .bottom{position:absolute;bottom:48px;left:48px;right:48px;display:flex;justify-content:space-between;align-items:flex-end;z-index:5;}
  .year{font-family:'Archivo Black',sans-serif;font-size:96px;line-height:88px;color:#fff;letter-spacing:-.04em;margin:0;}
  .name-line{display:flex;align-items:center;gap:14px;margin-top:16px;}
  .name-line .bar{width:36px;height:2px;background:#FFE74C;}
  .name-line .name{font-weight:500;font-size:22px;color:#fff;}
  .intro{font-weight:400;font-size:17px;line-height:26px;color:#fff;opacity:.85;max-width:380px;margin:18px 0 0;}
  .cta-row{display:flex;gap:14px;}
  .pill{padding:18px 36px;border-radius:999px;font-weight:700;font-size:15px;color:#1A3FD4;display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
  .pill.white{background:#fff;}
  .pill.yellow{background:#FFE74C;}
  .pill .arr{font-size:18px;}
</style>
</head>
<body>
<section class="stage" aria-label="Concept B: Bold Character">
  <header class="top-nav">
    <div class="brand"><i></i><span>dev.log</span></div>
    <nav class="nav-links"><span>Study</span><span>Project</span><span>About</span></nav>
  </header>

  <div class="top-headline" aria-label="Dev.log">
    <span>Dev</span><span>.log</span>
  </div>

  <div class="orbit" aria-hidden="true"></div>

  <svg class="silhouette" viewBox="0 0 340 540" xmlns="http://www.w3.org/2000/svg" aria-label="character silhouette">
    <ellipse cx="170" cy="110" rx="80" ry="92" fill="#0D2A9E"/>
    <path d="M 60 280 Q 60 220 170 215 Q 280 220 280 280 L 280 540 L 60 540 Z" fill="#0D2A9E"/>
    <rect x="105" y="200" width="130" height="40" fill="#0D2A9E"/>
  </svg>

  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>

  <div class="bottom">
    <div>
      <h1 class="year">2026</h1>
      <div class="name-line"><span class="bar"></span><span class="name">정유정</span></div>
      <p class="intro">2026년의 나.<br/>이것저것 만들고, 기록합니다.</p>
    </div>
    <div class="cta-row">
      <a class="pill white"><span>Study</span><span class="arr">→</span></a>
      <a class="pill yellow"><span>Project</span><span class="arr">→</span></a>
    </div>
  </div>
</section>
</body>
</html>
